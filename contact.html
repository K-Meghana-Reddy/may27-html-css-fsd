<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            padding: 10px 15px;
            background: blue;
            color: white;
            border: none;
        }

        .info {
            margin-top: 20px;
            padding: 10px;
            background: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Contact / Help Page</h2>
<form>
    <label>Name</label>
    <input type="text">

    <label>Email</label>
    <input type="email">

    <label>Subject</label>
    <input type="text">

    <label>Message</label>
    <textarea rows="5"></textarea>

    <button type="submit">Submit</button>
</form>
<div class="info">
    <h3>Society Office Details</h3>
    <p><b>Address:</b> Main Road, Near Community Hall</p>
    <p><b>Email:</b> support@society.com</p>
    <p><b>Phone:</b> +91 9876543210</p>
    <p><b>Office Timings:</b> 9:00 AM - 5:00 PM</p>
</div>

</body>
</html>
