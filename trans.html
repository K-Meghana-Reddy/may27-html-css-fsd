<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions</title>
    <style>
        .t1{
            width:100px;
            height:100px;
            background-color: palevioletred;
            transition:background-color 5s;
            position: relative;
        }
        .t1:hover{
            background-color: blue;
            right: 100px;
            left:100px;
            top:500px;
            bottom:500px;
        }
    </style>
</head>
<body>
    <div class="t1"></div>
</body>
</html>
